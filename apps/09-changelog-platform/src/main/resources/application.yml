spring:
  application:
    name: changelog-platform

  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5433/changelog}
    username: ${DATABASE_USERNAME:changelog}
    password: ${DATABASE_PASSWORD:changelog}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    from: ${MAIL_FROM_ADDRESS:noreply@changelog-platform.io}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8080/realms/changelog}
          jwk-set-uri: ${KEYCLOAK_JWK_URI:http://localhost:8080/realms/changelog/protocol/openid-connect/certs}

server:
  port: ${SERVER_PORT:8080}
  error:
    include-message: always
  ssl:
    enabled: ${SSL_ENABLED:false}
    key-store: ${SSL_KEYSTORE:classpath:keystore.p12}
    key-store-password: ${SSL_KEYSTORE_PASSWORD:}
    key-store-type: PKCS12
    key-alias: ${SSL_KEY_ALIAS:changelog}
    protocol: TLS

# Application Configuration
app:
  base-url: ${APP_BASE_URL:http://localhost:8080}
  public-url: ${PUBLIC_URL:http://localhost:8080}
  widget-cdn-url: ${WIDGET_CDN_URL:http://localhost:8080/widget}
  notification-email: ${NOTIFICATION_EMAIL:noreply@changelog-platform.io}

# MinIO Configuration
minio:
  endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
  access-key: ${MINIO_ACCESS_KEY:minioadmin}
  secret-key: ${MINIO_SECRET_KEY:minioadmin}
  bucket-name: ${MINIO_BUCKET:changelog-uploads}

# AI Gateway Configuration
ai:
  gateway-url: ${AI_GATEWAY_URL:http://localhost:4000}
  model: ${AI_MODEL:gpt-4}
