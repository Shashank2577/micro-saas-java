spring:
  application:
    name: client-portal-builder

  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5433/changelog}
    username: ${DATABASE_USERNAME:changelog}
    password: ${DATABASE_PASSWORD:changelog}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8080/realms/changelog}
          jwk-set-uri: ${KEYCLOAK_JWK_URI:http://localhost:8080/realms/changelog/protocol/openid-connect/certs}

server:
  port: ${SERVER_PORT:8081}
  error:
    include-message: always
